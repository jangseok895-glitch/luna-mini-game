<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>루칭방 미니게임</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');

*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:'Jua',sans-serif;
  background:linear-gradient(135deg,#dbeafe,#fce7f3,#ffffff);
  color:#1e293b;
  display:flex;
  justify-content:center;
  align-items:center;
}

.wrap{
  width:94%;
  max-width:760px;
  background:rgba(255,255,255,.78);
  border:3px solid rgba(147,197,253,.7);
  border-radius:30px;
  padding:28px;
  text-align:center;
  box-shadow:0 20px 55px rgba(59,130,246,.22);
}

.main-img{
  width:100%;
  max-height:240px;
  object-fit:cover;
  border-radius:24px;
  margin-bottom:14px;
}

h1{
  margin:8px 0 18px;
  font-size:46px;
  color:#3b82f6;
  text-shadow:3px 3px 0 #fbcfe8,0 0 12px rgba(255,255,255,.9);
}

h2{
  color:#ec4899;
  font-size:34px;
}

input{
  width:100%;
  padding:16px;
  margin-top:12px;
  border-radius:18px;
  border:3px solid #bfdbfe;
  font-size:20px;
  font-family:'Jua',sans-serif;
  outline:none;
}

.pin-wrap{position:relative}
.pin-wrap input{padding-right:60px}
.eye-btn{
  position:absolute;
  right:8px;
  top:18px;
  width:48px;
  height:44px;
  margin:0;
  padding:0;
  border-radius:14px;
  font-size:18px;
  background:#fbcfe8;
  color:#1e293b;
}

button{
  width:100%;
  padding:17px;
  margin-top:16px;
  border:0;
  border-radius:20px;
  font-size:23px;
  font-family:'Jua',sans-serif;
  font-weight:900;
  color:white;
  background:linear-gradient(135deg,#60a5fa,#ec4899);
  cursor:pointer;
  box-shadow:0 8px 0 rgba(59,130,246,.25);
}

button:active{transform:translateY(3px);box-shadow:none}
.hidden{display:none!important}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}

.game-btn{
  background:linear-gradient(135deg,#93c5fd,#f9a8d4);
  color:#1e293b;
  min-height:76px;
}

.ready-btn{background:linear-gradient(135deg,#22c55e,#60a5fa)}
.cancel-btn{background:linear-gradient(135deg,#f97316,#ef4444)}
.red-btn{background:linear-gradient(135deg,#ef4444,#fb7185)}

.character-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
  margin-top:16px;
}

.char{
  padding:12px;
  border-radius:18px;
  background:#eff6ff;
  border:3px solid transparent;
  cursor:pointer;
  font-size:34px;
}

.char.selected{
  border-color:#ec4899;
  background:#fce7f3;
}

.player-list{
  margin-top:18px;
  text-align:left;
  background:#eff6ff;
  border-radius:20px;
  padding:14px;
}

.player{
  padding:9px 10px;
  border-bottom:1px solid #bfdbfe;
  font-size:19px;
}

.problem{
  user-select:none;
  -webkit-user-select:none;
  margin:18px 0;
  padding:22px;
  border-radius:22px;
  background:#eff6ff;
  border:3px solid #bfdbfe;
  font-size:25px;
  color:#1d4ed8;
}

.msg{
  margin-top:12px;
  font-size:20px;
  color:#ef4444;
}

.count{
  font-size:86px;
  color:#ec4899;
  text-shadow:4px 4px 0 #bfdbfe;
}

.small{
  color:#64748b;
  font-size:18px;
}
</style>
</head>

<body>

<div class="wrap" id="loginScreen">
  <img class="main-img" src="https://i.ibb.co/PZs2pDCb/55555.jpg">
  <h1>루칭방 미니게임</h1>

  <input id="nicknameInput" placeholder="아이디 / 닉네임">

  <div class="pin-wrap">
    <input id="pinInput" type="password" placeholder="PIN5 비밀번호" maxlength="5">
    <button type="button" class="eye-btn" onclick="togglePin()">👁</button>
  </div>

  <button onclick="login()">로그인</button>
  <div id="loginMsg" class="msg"></div>
</div>

<div class="wrap hidden" id="characterScreen">
  <h1>캐릭터 선택</h1>
  <p class="small">한 번 고르면 계속 사용됩니다.</p>
  <div class="character-grid" id="characterGrid"></div>
  <button onclick="saveCharacter()">이 캐릭터로 시작</button>
  <div id="charMsg" class="msg"></div>
</div>

<div class="wrap hidden" id="menuScreen">
  <h1>게임 선택</h1>
  <p><span id="menuChar"></span> <b id="menuNick"></b> 님 환영합니다</p>

  <div class="grid">
    <button class="game-btn" onclick="enterTypingLobby()">루칭방 타자타자</button>
    <button class="game-btn" onclick="alert('준비중입니다')">준비중</button>
    <button class="game-btn" onclick="alert('준비중입니다')">준비중</button>
    <button class="game-btn" onclick="alert('준비중입니다')">준비중</button>
    <button class="game-btn" onclick="alert('준비중입니다')">준비중</button>
    <button class="game-btn" onclick="alert('준비중입니다')">준비중</button>
    <button class="game-btn" onclick="alert('준비중입니다')">준비중</button>
    <button class="game-btn" onclick="alert('준비중입니다')">준비중</button>
  </div>
</div>

<div class="wrap hidden" id="lobbyScreen">
  <h1>루칭방 타자타자</h1>
  <p><span id="myChar"></span> <b id="myNick"></b> 님 대기중</p>

  <button id="readyBtn" class="ready-btn" onclick="toggleReady()">준비</button>
  <button class="red-btn" onclick="backToMenu()">나가기</button>

  <div class="player-list" id="playerList"></div>
  <p class="small">모든 인원이 준비하면 5초 카운트 후 시작됩니다.</p>
</div>

<div class="wrap hidden" id="countScreen">
  <h1>곧 시작!</h1>
  <div class="count" id="countText">5</div>
</div>

<div class="wrap hidden" id="gameScreen">
  <h1>루칭방 타자타자</h1>
  <p>라운드 <b id="roundText">1</b> / 10 · 내 점수 <b id="scoreText">0</b>점</p>

  <div class="problem" id="problemText"></div>
  <input id="answerInput" placeholder="문장을 그대로 입력하세요" autocomplete="off"
         onpaste="return false" oncopy="return false" oncut="return false">
  <button onclick="submitAnswer()">제출</button>

  <div id="gameMsg" class="msg"></div>
  <div class="player-list" id="rankList"></div>
</div>

<div class="wrap hidden" id="finishScreen">
  <h1>게임 종료</h1>
  <div class="player-list" id="finalRank"></div>
  <button onclick="resetToLobby()">대기실로</button>
</div>

<script>
const SUPABASE_URL = "https://xyibdanmecakevhtdajl.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_uvYqwDymxodcSdpT1zAWyg_PeVHh_ZO";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const roomId = "main";
const maxRound = 10;

let user = null;
let selectedChar = "";
let isReady = false;
let currentRoom = null;
let submittedRound = null;
let roundStart = 0;
let countTimer = null;
let subscribed = false;

const characters = ["🐰","🐱","🐶","🐻","🐼","🐥","🦊","🐯","🐵","🐧"];

const sentences = [
  "동해물과 백두산이 마르고 닳도록 하느님이 보우하사 우리나라 만세",
  "정확하게 입력해야 점수를 받을 수 있습니다",
  "루칭방 타자타자 미니게임에 오신 것을 환영합니다",
  "빠른 손보다 중요한 것은 침착함과 정확도입니다",
  "모두가 준비하면 카운트다운 후 게임이 시작됩니다",
  "끝까지 집중하는 사람이 최종 우승자가 됩니다",
  "복사 붙여넣기는 사용할 수 없습니다",
  "가장 먼저 정확히 입력한 사람이 점수를 얻습니다",
  "마지막 라운드까지 포기하지 말고 도전하세요",
  "즐겁고 매너 있는 게임을 부탁드립니다",
  "푸른 하늘 아래 귀여운 캐릭터들이 달려갑니다",
  "실시간 점수판을 보며 순위를 확인하세요",
  "오늘의 승자는 과연 누가 될까요",
  "한 글자라도 틀리면 점수를 받을 수 없습니다",
  "준비를 취소하면 카운트다운이 멈춥니다"
];

function show(id){
  ["loginScreen","characterScreen","menuScreen","lobbyScreen","countScreen","gameScreen","finishScreen"].forEach(x=>{
    document.getElementById(x).classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
}

function togglePin(){
  const pin = document.getElementById("pinInput");
  pin.type = pin.type === "password" ? "text" : "password";
}

function renderCharacters(){
  const box = document.getElementById("characterGrid");
  box.innerHTML = "";
  characters.forEach(c=>{
    const div = document.createElement("div");
    div.className = "char" + (selectedChar === c ? " selected" : "");
    div.textContent = c;
    div.onclick = ()=>{
      selectedChar = c;
      renderCharacters();
    };
    box.appendChild(div);
  });
}

async function login(){
  const nickname = document.getElementById("nicknameInput").value.trim();
  const pin5 = document.getElementById("pinInput").value.trim();
  const msg = document.getElementById("loginMsg");
  msg.textContent = "";

  if(!nickname || !pin5){
    msg.textContent = "아이디와 PIN5를 입력해주세요.";
    return;
  }

  try{
    const { data, error } = await sb
      .from("team_members")
      .select("id,nickname,pin5,mini_character")
      .eq("nickname", nickname)
      .eq("pin5", pin5)
      .maybeSingle();

    if(error) throw error;

    if(!data){
      msg.textContent = "아이디 또는 PIN5가 일치하지 않습니다.";
      return;
    }

    user = data;
    selectedChar = data.mini_character || "";

    if(!selectedChar){
      renderCharacters();
      show("characterScreen");
    }else{
      openMenu();
    }
  }catch(e){
    msg.textContent = "오류: " + (e.message || JSON.stringify(e));
  }
}

async function saveCharacter(){
  const msg = document.getElementById("charMsg");
  msg.textContent = "";

  if(!selectedChar){
    msg.textContent = "캐릭터를 선택해주세요.";
    return;
  }

  try{
    const { error } = await sb
      .from("team_members")
      .update({ mini_character:selectedChar })
      .eq("id", user.id);

    if(error) throw error;

    user.mini_character = selectedChar;
    openMenu();
  }catch(e){
    msg.textContent = "캐릭터 저장 오류: " + e.message;
  }
}

function openMenu(){
  document.getElementById("menuChar").textContent = user.mini_character;
  document.getElementById("menuNick").textContent = user.nickname;
  show("menuScreen");
}

async function enterTypingLobby(){
  try{
    await sb.from("typing_game_rooms").upsert({
      id:roomId,
      status:"waiting",
      round:0,
      max_round:maxRound,
      current_text:null,
      round_started_at:null,
      updated_at:new Date().toISOString()
    }, { onConflict:"id" });

    await sb.from("typing_game_players").upsert({
      room_id:roomId,
      nickname:user.nickname,
      pin5:user.pin5,
      character:user.mini_character,
      score:0,
      ready:false,
      last_seen:new Date().toISOString()
    }, { onConflict:"room_id,nickname" });

    isReady = false;
    document.getElementById("readyBtn").textContent = "준비";
    document.getElementById("readyBtn").className = "ready-btn";
    document.getElementById("myChar").textContent = user.mini_character;
    document.getElementById("myNick").textContent = user.nickname;

    show("lobbyScreen");
    subscribe();
    await loadPlayers();
    await loadRoom();
  }catch(e){
    alert("입장 오류: " + e.message);
  }
}

async function backToMenu(){
  await sb.from("typing_game_players")
    .delete()
    .eq("room_id",roomId)
    .eq("nickname",user.nickname);

  openMenu();
}

async function toggleReady(){
  isReady = !isReady;

  await sb.from("typing_game_players")
    .update({ ready:isReady, last_seen:new Date().toISOString() })
    .eq("room_id",roomId)
    .eq("nickname",user.nickname);

  document.getElementById("readyBtn").textContent = isReady ? "준비 취소" : "준비";
  document.getElementById("readyBtn").className = isReady ? "cancel-btn" : "ready-btn";

  await checkReadyStart();
}

async function loadPlayers(){
  const { data } = await sb
    .from("typing_game_players")
    .select("nickname,score,character,ready")
    .eq("room_id",roomId)
    .order("score",{ascending:false});

  const list = document.getElementById("playerList");
  list.innerHTML = "<b>참가자 목록</b>";

  (data || []).forEach(p=>{
    list.innerHTML += `<div class="player">${p.character || "🐰"} ${p.nickname} · ${p.ready ? "준비완료 ✅" : "대기중 ⏳"} · ${p.score || 0}점</div>`;
  });

  return data || [];
}

async function checkReadyStart(){
  const players = await loadPlayers();
  if(!players.length) return;

  const allReady = players.every(p=>p.ready === true);

  if(allReady){
    await startCountdownRoom();
  }else{
    await sb.from("typing_game_rooms")
      .update({status:"waiting",updated_at:new Date().toISOString()})
      .eq("id",roomId);
  }
}

async function startCountdownRoom(){
  const text = sentences[Math.floor(Math.random()*sentences.length)];

  await sb.from("typing_game_rooms")
    .update({
      status:"countdown",
      round:1,
      current_text:text,
      round_started_at:null,
      updated_at:new Date().toISOString()
    })
    .eq("id",roomId);
}

async function loadRoom(){
  const { data } = await sb
    .from("typing_game_rooms")
    .select("*")
    .eq("id",roomId)
    .single();

  if(data) handleRoom(data);
}

function handleRoom(room){
  currentRoom = room;

  if(room.status === "waiting"){
    clearInterval(countTimer);
    show("lobbyScreen");
  }

  if(room.status === "countdown"){
    startLocalCountdown();
  }

  if(room.status === "playing"){
    startRound(room);
  }

  if(room.status === "finished"){
    showFinish();
  }
}

function startLocalCountdown(){
  show("countScreen");
  let n = 5;
  document.getElementById("countText").textContent = n;
  clearInterval(countTimer);

  countTimer = setInterval(async()=>{
    const players = await loadPlayers();
    const allReady = players.length && players.every(p=>p.ready === true);

    if(!allReady){
      clearInterval(countTimer);
      await sb.from("typing_game_rooms")
        .update({status:"waiting",updated_at:new Date().toISOString()})
        .eq("id",roomId);
      return;
    }

    n--;
    if(n > 0){
      document.getElementById("countText").textContent = n;
    }else{
      clearInterval(countTimer);
      await sb.from("typing_game_rooms")
        .update({
          status:"playing",
          round_started_at:new Date().toISOString(),
          updated_at:new Date().toISOString()
        })
        .eq("id",roomId);
    }
  },1000);
}

function startRound(room){
  show("gameScreen");
  submittedRound = null;
  roundStart = Date.now();

  document.getElementById("roundText").textContent = room.round;
  document.getElementById("problemText").textContent = room.current_text;
  document.getElementById("answerInput").value = "";
  document.getElementById("answerInput").focus();
  document.getElementById("gameMsg").textContent = "";

  loadMyScore();
  loadRanks();
}

async function submitAnswer(){
  if(!currentRoom || currentRoom.status !== "playing") return;

  if(submittedRound === currentRoom.round){
    document.getElementById("gameMsg").textContent = "이미 제출했습니다.";
    return;
  }

  const answer = document.getElementById("answerInput").value.trim();
  const correct = answer === currentRoom.current_text;
  const elapsed = Date.now() - roundStart;
  submittedRound = currentRoom.round;

  await sb.from("typing_game_answers").insert({
    room_id:roomId,
    round:currentRoom.round,
    nickname:user.nickname,
    answer,
    is_correct:correct,
    elapsed_ms:elapsed
  });

  if(!correct){
    document.getElementById("gameMsg").textContent = "오답입니다.";
    return;
  }

  document.getElementById("gameMsg").textContent = "정답 제출 완료!";
  setTimeout(checkWinner,500);
}

async function checkWinner(){
  const { data } = await sb
    .from("typing_game_answers")
    .select("*")
    .eq("room_id",roomId)
    .eq("round",currentRoom.round)
    .eq("is_correct",true)
    .order("elapsed_ms",{ascending:true})
    .limit(1);

  if(!data || !data.length) return;

  const winner = data[0].nickname;

  const { data: p } = await sb
    .from("typing_game_players")
    .select("score")
    .eq("room_id",roomId)
    .eq("nickname",winner)
    .single();

  await sb.from("typing_game_players")
    .update({score:(p?.score || 0)+10})
    .eq("room_id",roomId)
    .eq("nickname",winner);

  setTimeout(nextRound,1500);
}

async function nextRound(){
  if(currentRoom.round >= maxRound){
    await sb.from("typing_game_rooms")
      .update({status:"finished",updated_at:new Date().toISOString()})
      .eq("id",roomId);
    return;
  }

  const text = sentences[Math.floor(Math.random()*sentences.length)];

  await sb.from("typing_game_rooms")
    .update({
      status:"playing",
      round:currentRoom.round+1,
      current_text:text,
      round_started_at:new Date().toISOString(),
      updated_at:new Date().toISOString()
    })
    .eq("id",roomId);
}

async function loadMyScore(){
  const { data } = await sb
    .from("typing_game_players")
    .select("score")
    .eq("room_id",roomId)
    .eq("nickname",user.nickname)
    .single();

  document.getElementById("scoreText").textContent = data?.score || 0;
}

async function loadRanks(){
  const { data } = await sb
    .from("typing_game_players")
    .select("nickname,score,character")
    .eq("room_id",roomId)
    .order("score",{ascending:false});

  const box = document.getElementById("rankList");
  box.innerHTML = "<b>현재 순위</b>";

  (data || []).forEach((p,i)=>{
    box.innerHTML += `<div class="player">${i+1}위 ${p.character || "🐰"} ${p.nickname} - ${p.score || 0}점</div>`;
  });
}

async function showFinish(){
  show("finishScreen");

  const { data } = await sb
    .from("typing_game_players")
    .select("nickname,score,character")
    .eq("room_id",roomId)
    .order("score",{ascending:false});

  const box = document.getElementById("finalRank");
  box.innerHTML = "<b>최종 순위</b>";

  (data || []).forEach((p,i)=>{
    box.innerHTML += `<div class="player">${i+1}위 ${p.character || "🐰"} ${p.nickname} - ${p.score || 0}점</div>`;
  });
}

async function resetToLobby(){
  await sb.from("typing_game_players")
    .update({ready:false,score:0})
    .eq("room_id",roomId)
    .eq("nickname",user.nickname);

  await sb.from("typing_game_rooms")
    .update({status:"waiting",round:0,current_text:null,updated_at:new Date().toISOString()})
    .eq("id",roomId);

  enterTypingLobby();
}

function subscribe(){
  if(subscribed) return;
  subscribed = true;

  sb.channel("typing_game_all")
    .on("postgres_changes",{event:"*",schema:"public",table:"typing_game_players"},async()=>{
      await loadPlayers();
      await loadRanks();
      await loadMyScore();
      await checkReadyStart();
    })
    .on("postgres_changes",{event:"*",schema:"public",table:"typing_game_rooms"},async()=>{
      await loadRoom();
    })
    .subscribe();
}
</script>

</body>
</html>
