<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>루칭방 미니게임</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
  box-sizing:border-box;
  font-family:굴림, Gulim, sans-serif !important;
  font-weight:400 !important;
}

body{
  margin:0;
  min-height:100vh;
  background:linear-gradient(135deg,#dbeafe,#fce7f3,#ffffff);
  color:#1e293b;
}

.hidden{display:none!important}

.screen{
  width:100%;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:18px;
}

.wrap{
  width:94%;
  max-width:820px;
  background:rgba(255,255,255,.86);
  border:3px solid rgba(147,197,253,.75);
  border-radius:30px;
  padding:28px;
  text-align:center;
  box-shadow:0 20px 55px rgba(59,130,246,.22);
}

.main-img{
  width:100%;
  max-height:240px;
  object-fit:cover;
  border-radius:24px;
  margin-bottom:14px;
}

h1{
  margin:8px 0 18px;
  font-size:42px;
  color:#3b82f6;
  text-shadow:3px 3px 0 #fbcfe8;
}

h2{
  margin:8px 0 12px;
  color:#ec4899;
  font-size:26px;
}

input{
  width:100%;
  padding:15px;
  margin-top:12px;
  border-radius:18px;
  border:3px solid #bfdbfe;
  font-size:18px;
  outline:none;
}

button{
  width:100%;
  padding:15px;
  margin-top:14px;
  border:0;
  border-radius:20px;
  font-size:20px;
  color:white;
  background:linear-gradient(135deg,#60a5fa,#ec4899);
  cursor:pointer;
  box-shadow:0 7px 0 rgba(59,130,246,.22);
}

button:active{
  transform:translateY(3px);
  box-shadow:none;
}

.small{
  color:#64748b;
  font-size:15px;
}

.msg{
  margin-top:12px;
  font-size:18px;
  color:#ef4444;
}

.pin-wrap{position:relative}
.pin-wrap input{padding-right:60px}

.eye-btn{
  position:absolute;
  right:8px;
  top:18px;
  width:48px;
  height:44px;
  margin:0;
  padding:0;
  border-radius:14px;
  font-size:16px;
  background:#fbcfe8;
  color:#1e293b;
}

.character-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
  margin-top:16px;
}

.char{
  padding:12px;
  border-radius:18px;
  background:#eff6ff;
  border:3px solid transparent;
  cursor:pointer;
  font-size:32px;
}

.char.selected{
  border-color:#ec4899;
  background:#fce7f3;
}

.menu-layout{
  width:100%;
  max-width:1280px;
  display:grid;
  grid-template-columns:260px 1fr 270px;
  gap:18px;
  align-items:stretch;
}

.side-panel,
.menu-center{
  background:rgba(255,255,255,.86);
  border:3px solid rgba(147,197,253,.75);
  border-radius:26px;
  padding:18px;
  box-shadow:0 16px 42px rgba(59,130,246,.16);
}

.game-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}

.game-btn{
  background:linear-gradient(135deg,#93c5fd,#f9a8d4);
  color:#1e293b;
  min-height:76px;
}

.rank-item,
.online-item,
.viewer-item{
  padding:8px 10px;
  border-bottom:1px solid #bfdbfe;
  text-align:left;
  font-size:15px;
  word-break:break-all;
}

.menu-chat-box{
  margin-top:18px;
  background:#f8fafc;
  border:2px solid #bfdbfe;
  border-radius:18px;
  padding:10px;
}

.menu-chat-log{
  height:110px;
  overflow-y:auto;
  background:white;
  border-radius:12px;
  padding:8px;
  text-align:left;
  font-size:14px;
}

.menu-chat-row{
  display:flex;
  gap:8px;
  margin-top:8px;
}

.menu-chat-row input{
  margin:0;
  flex:1;
}

.menu-chat-row button{
  margin:0;
  width:90px;
  padding:10px;
  font-size:15px;
}

.typing-layout{
  width:100%;
  min-height:100vh;
  display:grid;
  grid-template-columns:1fr 270px;
  gap:16px;
  padding:16px;
}

.typing-main,
.typing-side{
  background:rgba(255,255,255,.86);
  border:3px solid rgba(147,197,253,.72);
  border-radius:28px;
  padding:18px;
  box-shadow:0 16px 42px rgba(59,130,246,.16);
}

.typing-main{
  min-height:calc(100vh - 32px);
  display:flex;
  flex-direction:column;
}

.center-message{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  margin:12px 0;
}

.message-box{
  width:80%;
  min-height:160px;
  border-radius:28px;
  border:4px dashed #bfdbfe;
  background:linear-gradient(135deg,#eff6ff,#fdf2f8);
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:24px;
  font-size:26px;
  color:#2563eb;
}

.seat-row{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:8px;
  margin-top:10px;
}

.seat{
  min-height:120px;
  background:#eff6ff;
  border:3px solid #bfdbfe;
  border-radius:20px;
  padding:8px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.seat.empty{
  opacity:.65;
  background:#f8fafc;
}

.seat-char{
  font-size:30px;
}

.seat-name{
  font-size:14px;
  word-break:break-all;
}

.seat-score{
  font-size:13px;
  color:#ef4444;
}

.ready-mark{
  font-size:13px;
  color:#16a34a;
}

.seat-chat{
  margin-top:5px;
  padding:5px 7px;
  background:#fff;
  border:2px solid #f9a8d4;
  border-radius:12px;
  font-size:12px;
  color:#333;
  max-width:100%;
  word-break:break-all;
}

.chat-area{
  margin-top:12px;
  background:#f8fafc;
  border:3px solid #dbeafe;
  border-radius:20px;
  padding:12px;
}

.chat-log{
  height:115px;
  overflow:auto;
  text-align:left;
  font-size:14px;
  padding:8px;
  background:white;
  border-radius:14px;
}

.chat-input-row{
  display:flex;
  gap:8px;
  margin-top:8px;
}

.chat-input-row input{
  margin:0;
}

.chat-input-row button{
  width:90px;
  margin:0;
  padding:10px;
  font-size:15px;
}

.ready-btn{
  background:linear-gradient(135deg,#22c55e,#60a5fa);
}

.cancel-btn{
  background:linear-gradient(135deg,#f97316,#ef4444);
}

.spectator-btn{
  background:linear-gradient(135deg,#a78bfa,#60a5fa);
}

.exit-btn{
  background:linear-gradient(135deg,#64748b,#ef4444);
}

.bottom-buttons{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:10px;
}

.bottom-buttons button{
  margin-top:0;
  padding:11px;
  font-size:15px;
}

.typing-side button{
  width:100%;
  padding:10px;
  font-size:15px;
  margin-top:8px;
}

.problem{
  user-select:none;
  -webkit-user-select:none;
  margin:14px 0;
  padding:20px;
  border-radius:22px;
  background:#eff6ff;
  border:3px solid #bfdbfe;
  font-size:22px;
  color:#1d4ed8;
}

.count{
  font-size:82px;
  color:#ec4899;
  text-shadow:4px 4px 0 #bfdbfe;
}

@media(max-width:1000px){
  .menu-layout,
  .typing-layout{
    grid-template-columns:1fr;
  }

  .seat-row{
    grid-template-columns:repeat(4,1fr);
  }
}

@media(max-width:600px){
  h1{font-size:32px}
  .character-grid{grid-template-columns:repeat(5,1fr)}
  .seat-row{grid-template-columns:repeat(2,1fr)}
  .bottom-buttons{grid-template-columns:1fr}
}

  .room-bubble-chat{
  display:flex;
  gap:8px;
  margin:8px auto 12px;
  width:70%;
}

.room-bubble-chat input{
  margin:0;
  flex:1;
  padding:12px;
  font-size:15px;
}

.room-bubble-chat button{
  margin:0;
  width:85px;
  padding:10px;
  font-size:15px;
}

.seat-chat{
  position:absolute;
  top:-42px;
  left:50%;
  transform:translateX(-50%);
  min-width:90px;
  max-width:150px;
  background:#ffffff;
  border:2px solid #f9a8d4;
  border-radius:16px;
  padding:7px 9px;
  font-size:12px;
  color:#333;
  word-break:break-all;
  box-shadow:0 6px 16px rgba(236,72,153,.18);
  z-index:5;
}

.seat-chat:after{
  content:"";
  position:absolute;
  bottom:-8px;
  left:50%;
  transform:translateX(-50%);
  border-width:8px 7px 0 7px;
  border-style:solid;
  border-color:#f9a8d4 transparent transparent transparent;
}

.seat{
  position:relative;
  overflow:visible;
}
</style>
</head>

<body>

<div class="screen" id="loginScreen">
  <div class="wrap">
    <img class="main-img" src="https://i.ibb.co/PZs2pDCb/55555.jpg">
    <h1>루칭방 미니게임</h1>

    <input id="nicknameInput" placeholder="아이디 / 닉네임">

    <div class="pin-wrap">
      <input id="pinInput" type="password" placeholder="PIN5 비밀번호" maxlength="5">
      <button type="button" class="eye-btn" onclick="togglePin()">보기</button>
    </div>

    <button onclick="login()">로그인</button>
    <div id="loginMsg" class="msg"></div>
  </div>
</div>

<div class="screen hidden" id="characterScreen">
  <div class="wrap">
    <h1>캐릭터 선택</h1>
    <p class="small">한 번 고르면 다음 로그인부터 계속 이 캐릭터로 시작됩니다.</p>
    <div class="character-grid" id="characterGrid"></div>
    <button onclick="saveCharacter()">이 캐릭터로 시작</button>
    <div id="charMsg" class="msg"></div>
  </div>
</div>

<div class="screen hidden" id="menuScreen">
  <div class="menu-layout">

    <div class="side-panel">
      <h2>점수 TOP 30</h2>
      <div id="topRankList"></div>
    </div>

    <div class="menu-center">
      <h1>게임 선택</h1>
      <button onclick="logout()" style="background:linear-gradient(135deg,#64748b,#ef4444);">
  로그아웃
</button>
      <p><span id="menuChar"></span> <span id="menuNick"></span> 님 환영합니다</p>

      <div class="game-grid">
        <button class="game-btn" onclick="enterTypingLobby()">루칭방 타자타자</button>
        <button class="game-btn" onclick="alert('준비중입니다')">준비중</button>
        <button class="game-btn" onclick="alert('준비중입니다')">준비중</button>
        <button class="game-btn" onclick="alert('준비중입니다')">준비중</button>
        <button class="game-btn" onclick="alert('준비중입니다')">준비중</button>
        <button class="game-btn" onclick="alert('준비중입니다')">준비중</button>
        <button class="game-btn" onclick="alert('준비중입니다')">준비중</button>
        <button class="game-btn" onclick="alert('준비중입니다')">준비중</button>
      </div>

      <div class="menu-chat-box">
        <div id="menuChatLog" class="menu-chat-log"></div>
        <div class="menu-chat-row">
          <input id="menuChatInput" placeholder="대기방 채팅 입력" maxlength="50"
            onkeydown="if(event.key==='Enter')sendMenuChat()">
          <button onclick="sendMenuChat()">전송</button>
        </div>
      </div>
    </div>

    <div class="side-panel">
      <h2>현재 접속자</h2>
      <div id="menuOnlineList"></div>
    </div>

  </div>
</div>

<div class="hidden" id="typingScreen">
  <div class="typing-layout">

    <div class="typing-main">
      <h1>루칭방 타자타자</h1>

      <div class="center-message">
        <div class="message-box" id="centerMessage">
          곧 메세지가 나올 공간입니다.
        </div>
      </div>

      <div class="room-bubble-chat">
  <input id="chatInput" placeholder="말풍선 채팅 입력" maxlength="35"
    onkeydown="if(event.key==='Enter')sendChat()">
  <button onclick="sendChat()">전송</button>
</div>

      <div id="problemArea" class="hidden">
        <p>라운드 <span id="roundText">1</span> / 10 · 내 점수 <span id="scoreText">0</span>점</p>
        <div class="problem" id="problemText"></div>
        <input id="answerInput" placeholder="문장을 그대로 입력하세요" autocomplete="off"
          onpaste="return false" oncopy="return false" oncut="return false">
        <button onclick="submitAnswer()">제출</button>
        <div id="gameMsg" class="msg"></div>
      </div>

      <div class="seat-row" id="seatRow"></div>



      <div class="bottom-buttons">
        <button id="readyBtn" class="ready-btn" onclick="toggleReady()">준비</button>
        <button class="exit-btn" onclick="leaveTyping()">나가기</button>
      </div>
    </div>

    <div class="typing-side">
      <h2>대기자</h2>
      <div id="typingPlayerList"></div>

      <h2 style="margin-top:20px;">관전자</h2>
      <div id="typingViewerList"></div>

      <button class="spectator-btn" onclick="goSpectator()">관전자로 가기</button>
      <button class="ready-btn" onclick="goPlayer()">선수로 가기</button>
    </div>

  </div>
</div>

<div class="screen hidden" id="countScreen">
  <div class="wrap">
    <h1>곧 시작</h1>
    <div class="count" id="countText">5</div>
  </div>
</div>

<div class="screen hidden" id="finishScreen">
  <div class="wrap">
    <h1>게임 종료</h1>
    <div id="finalRank"></div>
    <button onclick="resetToLobby()">대기실로</button>
  </div>
</div>

<script>
const SUPABASE_URL = "https://xyibdanmecakevhtdajl.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_uvYqwDymxodcSdpT1zAWyg_PeVHh_ZO";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const roomId = "main";
const maxRound = 10;
const seatCount = 8;

let user = null;
let selectedChar = "";
let isReady = false;
let myRole = "player";
let currentRoom = null;
let submittedRound = null;
let roundStart = 0;
let countTimer = null;
let subscribed = false;
let lastChats = [];

const characters = ["🐰","🐱","🐶","🐻","🐼","🐥","🦊","🐯","🐵","🐧"];

const sentences = [
  "동해물과 백두산이 마르고 닳도록 하느님이 보우하사 우리나라 만세",
  "정확하게 입력해야 점수를 받을 수 있습니다",
  "루칭방 타자타자 미니게임에 오신 것을 환영합니다",
  "빠른 손보다 중요한 것은 침착함과 정확도입니다",
  "모두가 준비하면 카운트다운 후 게임이 시작됩니다",
  "끝까지 집중하는 사람이 최종 우승자가 됩니다",
  "복사 붙여넣기는 사용할 수 없습니다",
  "가장 먼저 정확히 입력한 사람이 점수를 얻습니다",
  "마지막 라운드까지 포기하지 말고 도전하세요",
  "즐겁고 매너 있는 게임을 부탁드립니다",
  "푸른 하늘 아래 귀여운 캐릭터들이 달려갑니다",
  "실시간 점수판을 보며 순위를 확인하세요",
  "오늘의 승자는 과연 누가 될까요",
  "한 글자라도 틀리면 점수를 받을 수 없습니다",
  "준비를 취소하면 카운트다운이 멈춥니다"
];

function show(id){
  ["loginScreen","characterScreen","menuScreen","typingScreen","countScreen","finishScreen"].forEach(x=>{
    document.getElementById(x).classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
}

function togglePin(){
  const pin = document.getElementById("pinInput");
  pin.type = pin.type === "password" ? "text" : "password";
}

function renderCharacters(){
  const box = document.getElementById("characterGrid");
  box.innerHTML = "";

  characters.forEach(c=>{
    const div = document.createElement("div");
    div.className = "char" + (selectedChar === c ? " selected" : "");
    div.textContent = c;
    div.onclick = ()=>{
      selectedChar = c;
      renderCharacters();
    };
    box.appendChild(div);
  });
}

async function login(){
  const nickname = document.getElementById("nicknameInput").value.trim();
  const pin5 = document.getElementById("pinInput").value.trim();
  const msg = document.getElementById("loginMsg");
  msg.textContent = "";

  if(!nickname || !pin5){
    msg.textContent = "아이디와 PIN5를 입력해주세요.";
    return;
  }

  try{
    const { data, error } = await sb
      .from("team_members")
      .select("id,nickname,pin5,mini_character")
      .eq("nickname", nickname)
      .eq("pin5", pin5)
      .maybeSingle();

    if(error) throw error;

    if(!data){
      msg.textContent = "아이디 또는 PIN5가 일치하지 않습니다.";
      return;
    }

    user = data;

    selectedChar = data.mini_character || localStorage.getItem("mini_character_" + data.nickname) || "";
    user.mini_character = selectedChar;

    if(!selectedChar){
      renderCharacters();
      show("characterScreen");
      return;
    }

    await markOnline("대기방");
    openMenu();
  }catch(e){
    msg.textContent = "오류: " + (e.message || JSON.stringify(e));
  }
}

async function saveCharacter(){
  const msg = document.getElementById("charMsg");
  msg.textContent = "";

  if(!selectedChar){
    msg.textContent = "캐릭터를 선택해주세요.";
    return;
  }

  try{
    const { error } = await sb
      .from("team_members")
      .update({ mini_character:selectedChar })
      .eq("id", user.id);

    if(error) throw error;

    user.mini_character = selectedChar;
    localStorage.setItem("mini_character_" + user.nickname, selectedChar);

    await markOnline("대기방");
    openMenu();
  }catch(e){
    msg.textContent = "캐릭터 저장 오류: " + e.message;
  }
}

async function markOnline(place){
  if(!user) return;

  await sb.from("typing_game_players").upsert({
    room_id:"online",
    nickname:user.nickname,
    pin5:user.pin5,
    character:user.mini_character || selectedChar || "🐰",
    score:0,
    ready:false,
    role:"online",
    current_place:place || "대기방",
    last_seen:new Date().toISOString()
  }, { onConflict:"room_id,nickname" });
}

async function openMenu(){
  document.getElementById("menuChar").textContent = user.mini_character;
  document.getElementById("menuNick").textContent = user.nickname;

  show("menuScreen");
  subscribe();

  await markOnline("대기방");
  await loadMenuOnline();
  await loadTopRanks();
  await loadMenuChat();
}

async function loadMenuOnline(){
  const { data } = await sb
    .from("typing_game_players")
    .select("nickname,character,current_place,room_id,role,last_seen")
    .order("last_seen",{ascending:false});

  const box = document.getElementById("menuOnlineList");
  box.innerHTML = "";

  const filtered = (data || []).filter((p, index, arr)=>{
    return arr.findIndex(x=>x.nickname === p.nickname) === index;
  });

  if(!filtered.length){
    box.innerHTML = `<div class="online-item">현재 접속자 없음</div>`;
    return;
  }

  filtered.forEach(p=>{
    let place = "대기방";

    if(p.room_id === roomId){
      place = "루칭방 타자타자";
    }

    box.innerHTML += `
      <div class="online-item">
        ${p.character || "🐰"} ${escapeHtml(p.nickname)} [${place}]
      </div>
    `;
  });
}

async function loadTopRanks(){
  const { data } = await sb
    .from("typing_game_players")
    .select("nickname,score,character")
    .eq("room_id",roomId)
    .order("score",{ascending:false})
    .limit(30);

  const box = document.getElementById("topRankList");
  box.innerHTML = "";

  if(!data || !data.length){
    box.innerHTML = `<div class="rank-item">아직 기록 없음</div>`;
    return;
  }

  data.forEach((p,i)=>{
    box.innerHTML += `<div class="rank-item">${i+1}위 ${p.character || "🐰"} ${escapeHtml(p.nickname)} · ${p.score || 0}점</div>`;
  });
}

async function sendMenuChat(){
  const input = document.getElementById("menuChatInput");
  const message = input.value.trim();

  if(!message || !user) return;

  input.value = "";

  await sb.from("mini_game_chats").insert({
    place:"menu",
    nickname:user.nickname,
    character:user.mini_character,
    message
  });

  await loadMenuChat();
}

async function loadMenuChat(){
  const { data } = await sb
    .from("mini_game_chats")
    .select("nickname,character,message,created_at")
    .eq("place","menu")
    .order("created_at",{ascending:false})
    .limit(5);

  const box = document.getElementById("menuChatLog");
  if(!box) return;

  box.innerHTML = "";

  (data || []).reverse().forEach(c=>{
    box.innerHTML += `
      <div>${c.character || "🐰"} ${escapeHtml(c.nickname)} : ${escapeHtml(c.message)}</div>
    `;
  });

  box.scrollTop = box.scrollHeight;
}

async function enterTypingLobby(){
await sb.from("typing_game_chats")
  .delete()
  .eq("room_id",roomId)
  .eq("nickname",user.nickname);
  
  try{
    await sb.from("typing_game_rooms").upsert({
      id:roomId,
      status:"waiting",
      round:0,
      max_round:maxRound,
      current_text:null,
      round_started_at:null,
      updated_at:new Date().toISOString()
    }, { onConflict:"id" });

    await sb.from("typing_game_players")
      .delete()
      .eq("room_id","online")
      .eq("nickname",user.nickname);

    const { data: usedSeats } = await sb
      .from("typing_game_players")
      .select("seat_no")
      .eq("room_id",roomId)
      .not("seat_no","is",null);

    const used = (usedSeats || []).map(x => Number(x.seat_no));
    let mySeat = 1;

    for(let i=1; i<=8; i++){
      if(!used.includes(i)){
        mySeat = i;
        break;
      }
    }

    await sb.from("typing_game_players").upsert({
      room_id:roomId,
      nickname:user.nickname,
      pin5:user.pin5,
      character:user.mini_character,
      score:0,
      ready:false,
      role:"player",
      seat_no:mySeat,
      current_place:"루칭방 타자타자",
      last_seen:new Date().toISOString()
    }, { onConflict:"room_id,nickname" });

    myRole = "player";
    isReady = false;

    document.getElementById("readyBtn").classList.remove("hidden");
    document.getElementById("readyBtn").textContent = "준비";
    document.getElementById("readyBtn").className = "ready-btn";

    show("typingScreen");
    subscribe();

    await loadTypingPlayers();
    await loadChats();
    await loadRoom();
  }catch(e){
    alert("입장 오류: " + e.message);
  }
}

async function loadTypingPlayers(){
  const { data } = await sb
    .from("typing_game_players")
    .select("nickname,score,character,ready,role,seat_no")
    .eq("room_id",roomId)
    .order("seat_no",{ascending:true});

  const all = data || [];
  const players = all.filter(p => (p.role || "player") === "player").slice(0,seatCount);
  const viewers = all.filter(p => p.role === "viewer");

  renderSeats(players);
  renderSidePlayers(players, viewers);

  return { players, viewers };
}

function renderSeats(players){
  const row = document.getElementById("seatRow");
  row.innerHTML = "";

  for(let i=0; i<seatCount; i++){
    const seatNo = i + 1;
    const p = players.find(x => Number(x.seat_no) === seatNo);

    if(!p){
      row.innerHTML += `
        <div class="seat empty" onclick="moveSeat(${seatNo})">
          <div class="seat-char">＋</div>
          <div class="seat-name">빈 자리</div>
        </div>
      `;
      continue;
    }

    const chat = [...lastChats].reverse().find(c => c.nickname === p.nickname);
    const chatHtml = chat ? `<div class="seat-chat">${escapeHtml(chat.message)}</div>` : "";

    row.innerHTML += `
      <div class="seat">
        <div class="seat-char">${p.character || "🐰"}</div>
        <div class="seat-name">${escapeHtml(p.nickname)}</div>
        <div class="seat-score">${p.score || 0}점</div>
        <div class="ready-mark">${p.ready ? "준비완료" : "대기중"}</div>
        ${chatHtml}
      </div>
    `;
  }
}

async function moveSeat(seatNo){
  if(myRole === "viewer"){
    alert("관전자는 자리를 선택할 수 없습니다.");
    return;
  }

  const { data } = await sb
    .from("typing_game_players")
    .select("nickname")
    .eq("room_id",roomId)
    .eq("seat_no",seatNo)
    .maybeSingle();

  if(data){
    alert("이미 사용 중인 자리입니다.");
    return;
  }

  await sb.from("typing_game_players")
    .update({ seat_no:seatNo })
    .eq("room_id",roomId)
    .eq("nickname",user.nickname);

  await loadTypingPlayers();
}

function renderSidePlayers(players, viewers){
  const pbox = document.getElementById("typingPlayerList");
  const vbox = document.getElementById("typingViewerList");

  pbox.innerHTML = "";
  vbox.innerHTML = "";

  if(!players.length){
    pbox.innerHTML = `<div class="online-item">선수 없음</div>`;
  }else{
    players.forEach(p=>{
      pbox.innerHTML += `<div class="online-item">${p.character || "🐰"} ${escapeHtml(p.nickname)} · ${p.ready ? "준비" : "대기"}</div>`;
    });
  }

  if(!viewers.length){
    vbox.innerHTML = `<div class="viewer-item">관전자 없음</div>`;
  }else{
    viewers.forEach(p=>{
      vbox.innerHTML += `<div class="viewer-item">${p.character || "🐰"} ${escapeHtml(p.nickname)}</div>`;
    });
  }
}

async function goSpectator(){
  myRole = "viewer";
  isReady = false;

  await sb.from("typing_game_players")
    .update({
      role:"viewer",
      ready:false,
      seat_no:null,
      current_place:"루칭방 타자타자",
      last_seen:new Date().toISOString()
    })
    .eq("room_id",roomId)
    .eq("nickname",user.nickname);

  document.getElementById("readyBtn").classList.add("hidden");

  await loadTypingPlayers();
  await checkReadyStart();
}

async function goPlayer(){
  myRole = "player";

  const { data: usedSeats } = await sb
    .from("typing_game_players")
    .select("seat_no")
    .eq("room_id",roomId)
    .not("seat_no","is",null);

  const used = (usedSeats || []).map(x => Number(x.seat_no));
  let mySeat = null;

  for(let i=1; i<=8; i++){
    if(!used.includes(i)){
      mySeat = i;
      break;
    }
  }

  if(!mySeat){
    alert("빈 자리가 없습니다.");
    return;
  }

  await sb.from("typing_game_players")
    .update({
      role:"player",
      ready:false,
      seat_no:mySeat,
      current_place:"루칭방 타자타자",
      last_seen:new Date().toISOString()
    })
    .eq("room_id",roomId)
    .eq("nickname",user.nickname);

  document.getElementById("readyBtn").classList.remove("hidden");
  document.getElementById("readyBtn").textContent = "준비";
  document.getElementById("readyBtn").className = "ready-btn";

  await loadTypingPlayers();
}

async function toggleReady(){
  if(myRole === "viewer"){
    alert("관전자는 준비할 수 없습니다.");
    return;
  }

  isReady = !isReady;

  await sb.from("typing_game_players")
    .update({
      ready:isReady,
      last_seen:new Date().toISOString()
    })
    .eq("room_id",roomId)
    .eq("nickname",user.nickname);

  document.getElementById("readyBtn").textContent = isReady ? "준비 취소" : "준비";
  document.getElementById("readyBtn").className = isReady ? "cancel-btn" : "ready-btn";

  await checkReadyStart();
}

async function checkReadyStart(){
  const { players } = await loadTypingPlayers();

  if(!players.length) return;

  const allReady = players.every(p=>p.ready === true);

  if(allReady){
    await startCountdownRoom();
  }else{
    await sb.from("typing_game_rooms")
      .update({
        status:"waiting",
        updated_at:new Date().toISOString()
      })
      .eq("id",roomId);
  }
}

async function startCountdownRoom(){
  const text = sentences[Math.floor(Math.random()*sentences.length)];

  await sb.from("typing_game_rooms")
    .update({
      status:"countdown",
      round:1,
      current_text:text,
      round_started_at:null,
      updated_at:new Date().toISOString()
    })
    .eq("id",roomId);
}

async function loadRoom(){
  const { data } = await sb
    .from("typing_game_rooms")
    .select("*")
    .eq("id",roomId)
    .single();

  if(data) handleRoom(data);
}

function handleRoom(room){
  currentRoom = room;

  if(room.status === "waiting"){
    clearInterval(countTimer);
    document.getElementById("problemArea").classList.add("hidden");
    document.getElementById("centerMessage").textContent = "곧 메세지가 나올 공간입니다.";
    show("typingScreen");
  }

  if(room.status === "countdown"){
    startLocalCountdown();
  }

  if(room.status === "playing"){
    startRound(room);
  }

  if(room.status === "finished"){
    showFinish();
  }
}

function startLocalCountdown(){
  show("countScreen");

  let n = 5;
  document.getElementById("countText").textContent = n;
  clearInterval(countTimer);

  countTimer = setInterval(async()=>{
    const { players } = await loadTypingPlayers();
    const allReady = players.length && players.every(p=>p.ready === true);

    if(!allReady){
      clearInterval(countTimer);

      await sb.from("typing_game_rooms")
        .update({
          status:"waiting",
          updated_at:new Date().toISOString()
        })
        .eq("id",roomId);

      return;
    }

    n--;

    if(n > 0){
      document.getElementById("countText").textContent = n;
    }else{
      clearInterval(countTimer);

      await sb.from("typing_game_rooms")
        .update({
          status:"playing",
          round_started_at:new Date().toISOString(),
          updated_at:new Date().toISOString()
        })
        .eq("id",roomId);
    }
  },1000);
}

function startRound(room){
  show("typingScreen");

  submittedRound = null;
  roundStart = Date.now();

  document.getElementById("problemArea").classList.remove("hidden");
  document.getElementById("centerMessage").textContent = "타자타자 시작";
  document.getElementById("roundText").textContent = room.round;
  document.getElementById("problemText").textContent = room.current_text;
  document.getElementById("answerInput").value = "";
  document.getElementById("gameMsg").textContent = "";

  if(myRole === "player"){
    document.getElementById("answerInput").disabled = false;
    document.getElementById("answerInput").focus();
  }else{
    document.getElementById("answerInput").disabled = true;
  }

  loadMyScore();
  loadTypingPlayers();
}

async function submitAnswer(){
  if(myRole === "viewer"){
    document.getElementById("gameMsg").textContent = "관전자는 제출할 수 없습니다.";
    return;
  }

  if(!currentRoom || currentRoom.status !== "playing") return;

  if(submittedRound === currentRoom.round){
    document.getElementById("gameMsg").textContent = "이미 제출했습니다.";
    return;
  }

  const answer = document.getElementById("answerInput").value.trim();
  const correct = answer === currentRoom.current_text;
  const elapsed = Date.now() - roundStart;

  submittedRound = currentRoom.round;

  await sb.from("typing_game_answers").insert({
    room_id:roomId,
    round:currentRoom.round,
    nickname:user.nickname,
    answer,
    is_correct:correct,
    elapsed_ms:elapsed
  });

  if(!correct){
    document.getElementById("gameMsg").textContent = "오답입니다.";
    return;
  }

  document.getElementById("gameMsg").textContent = "정답 제출 완료";
  setTimeout(checkWinner,500);
}

async function checkWinner(){
  const { data } = await sb
    .from("typing_game_answers")
    .select("*")
    .eq("room_id",roomId)
    .eq("round",currentRoom.round)
    .eq("is_correct",true)
    .order("elapsed_ms",{ascending:true})
    .limit(1);

  if(!data || !data.length) return;

  const winner = data[0].nickname;

  const { data: p } = await sb
    .from("typing_game_players")
    .select("score")
    .eq("room_id",roomId)
    .eq("nickname",winner)
    .single();

  await sb.from("typing_game_players")
    .update({ score:(p?.score || 0)+10 })
    .eq("room_id",roomId)
    .eq("nickname",winner);

  document.getElementById("centerMessage").textContent = `${winner} 님 정답 10점`;

  setTimeout(nextRound,1500);
}

async function nextRound(){
  if(currentRoom.round >= maxRound){
    await sb.from("typing_game_rooms")
      .update({
        status:"finished",
        updated_at:new Date().toISOString()
      })
      .eq("id",roomId);
    return;
  }

  const text = sentences[Math.floor(Math.random()*sentences.length)];

  await sb.from("typing_game_rooms")
    .update({
      status:"playing",
      round:currentRoom.round+1,
      current_text:text,
      round_started_at:new Date().toISOString(),
      updated_at:new Date().toISOString()
    })
    .eq("id",roomId);
}

async function loadMyScore(){
  const { data } = await sb
    .from("typing_game_players")
    .select("score")
    .eq("room_id",roomId)
    .eq("nickname",user.nickname)
    .single();

  document.getElementById("scoreText").textContent = data?.score || 0;
}

async function sendChat(){
  const input = document.getElementById("chatInput");
  const message = input.value.trim();

  if(!message || !user) return;

  input.value = "";

  await sb.from("typing_game_chats").insert({
    room_id:roomId,
    nickname:user.nickname,
    character:user.mini_character,
    message
  });

  await loadChats();
}

async function loadChats(){
  const { data } = await sb
    .from("typing_game_chats")
    .select("nickname,character,message,created_at")
    .eq("room_id",roomId)
    .order("created_at",{ascending:false})
    .limit(30);

  lastChats = (data || []).reverse();

  if(!document.getElementById("typingScreen").classList.contains("hidden")){
    await loadTypingPlayers();
  }
}

async function showFinish(){
  show("finishScreen");

  const { data } = await sb
    .from("typing_game_players")
    .select("nickname,score,character,role")
    .eq("room_id",roomId)
    .eq("role","player")
    .order("score",{ascending:false});

  const box = document.getElementById("finalRank");
  box.innerHTML = "<h2>최종 순위</h2>";

  (data || []).forEach((p,i)=>{
    box.innerHTML += `<div class="rank-item">${i+1}위 ${p.character || "🐰"} ${escapeHtml(p.nickname)} - ${p.score || 0}점</div>`;
  });
}

async function resetToLobby(){
  await sb.from("typing_game_players")
    .update({
      ready:false,
      score:0,
      role:myRole || "player"
    })
    .eq("room_id",roomId)
    .eq("nickname",user.nickname);

  await sb.from("typing_game_rooms")
    .update({
      status:"waiting",
      round:0,
      current_text:null,
      updated_at:new Date().toISOString()
    })
    .eq("id",roomId);

  enterTypingLobby();
}

async function leaveTyping(){
  await sb.from("typing_game_chats")
    .delete()
    .eq("room_id",roomId)
    .eq("nickname",user.nickname);

  await sb.from("typing_game_players")
    .delete()
    .eq("room_id",roomId)
    .eq("nickname",user.nickname);

  lastChats = [];

  await markOnline("대기방");
  openMenu();
}

function subscribe(){
  if(subscribed) return;
  subscribed = true;

  sb.channel("typing_game_all")
    .on("postgres_changes",{event:"*",schema:"public",table:"typing_game_players"},async()=>{
      await loadMenuOnline();
      await loadTopRanks();

      if(!document.getElementById("typingScreen").classList.contains("hidden")){
        await loadTypingPlayers();
        await loadMyScore();
      }
    })
    .on("postgres_changes",{event:"*",schema:"public",table:"typing_game_rooms"},async()=>{
      await loadRoom();
    })
    .on("postgres_changes",{event:"*",schema:"public",table:"typing_game_chats"},async()=>{
      await loadChats();
    })
    .on("postgres_changes",{event:"*",schema:"public",table:"mini_game_chats"},async()=>{
      await loadMenuChat();
    })
    .subscribe();
}

function escapeHtml(str){
  return String(str || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

document.getElementById("nicknameInput")?.addEventListener("keydown", e=>{
  if(e.key === "Enter") login();
});

document.getElementById("pinInput")?.addEventListener("keydown", e=>{
  if(e.key === "Enter") login();
});

setInterval(()=>{
  if(user){
    const isTyping = !document.getElementById("typingScreen").classList.contains("hidden");
    markOnline(isTyping ? "루칭방 타자타자" : "대기방");
  }
},15000);

  async function logout(){
  if(user){
    await sb.from("typing_game_players")
      .delete()
      .eq("nickname",user.nickname);

    localStorage.removeItem("mini_login_nickname");
  }

  user = null;
  selectedChar = "";
  isReady = false;
  myRole = "player";
  currentRoom = null;
  lastChats = [];

  document.getElementById("nicknameInput").value = "";
  document.getElementById("pinInput").value = "";

  show("loginScreen");
}
</script>
