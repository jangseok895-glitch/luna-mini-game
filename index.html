<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>올라타자</title>

<style>
body{
  margin:0;
  min-height:100vh;
  background:linear-gradient(135deg,#111827,#1e293b);
  color:white;
  font-family:Arial, sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
}

.box{
  width:90%;
  max-width:520px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.15);
  border-radius:24px;
  padding:32px;
  text-align:center;
  box-shadow:0 20px 50px rgba(0,0,0,.35);
}

h1{
  margin:0 0 10px;
  font-size:46px;
  color:#60a5fa;
}

p{
  color:#d1d5db;
  line-height:1.6;
}

button{
  margin-top:20px;
  width:100%;
  padding:16px;
  border:0;
  border-radius:14px;
  background:#2563eb;
  color:white;
  font-size:22px;
  font-weight:800;
  cursor:pointer;
}

button:hover{
  background:#1d4ed8;
}
</style>
</head>

<body>

<div class="box">
  <h1>올라타자</h1>
  <p>
    루칭방 미니게임 사이트입니다.<br>
    닉네임과 PIN5 로그인 후 타자 게임을 진행합니다.
  </p>

  <button onclick="alert('다음 단계에서 로그인 기능을 연결합니다.')">
    게임 시작
  </button>
</div>

</body>
</html>
